# Cloud Build config for FRONTEND image
# Usage: gcloud builds submit --config cloudbuild.frontend.yaml .
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.frontend
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/stadium-frontend:latest'
      - .
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/stadium-frontend:latest'
substitutions:
  _REGION: asia-south1
  _REPO: stadium-repo
